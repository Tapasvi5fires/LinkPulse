version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed externally for security
    networks:
      - linkpulse-network

  redis:
    image: redis:7-alpine
    restart: always
    # No ports exposed externally for security
    networks:
      - linkpulse-network

  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: always
    # Qdrant can remain exposed if external access is needed for debugging, 
    # but for production on VPS, internal networking is safer.
    # Instruction implies keeping Postgres and Redis hidden.
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - linkpulse-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # Production command without --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # No code volume mounts in production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8090:8000"
    depends_on:
      - db
      - redis
      - qdrant
    networks:
      - linkpulse-network

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # Independent Celery worker
    command: celery -A app.core.celery_app worker --loglevel=info
    # No code volume mounts
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - db
      - redis
      - backend
    networks:
      - linkpulse-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    restart: always
    # Next.js port mapped to VPS public port
    ports:
      - "3090:3000"
    # No code volume mounts
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - linkpulse-network

volumes:
  postgres_data:
  qdrant_data:

networks:
  linkpulse-network:
    driver: bridge
