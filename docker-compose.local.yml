# CPU-Optimized Local Development Environment
# Use this for much faster builds on machines without NVIDIA GPUs.
# Run with: docker compose -f docker-compose.local.yml up -d

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432" # Exposed for local DB management tools
    networks:
      - linkpulse-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379" # Exposed for local debugging
    networks:
      - linkpulse-network

  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: always
    ports:
      - "6334:6333" # Exposed for Qdrant Dashboard/API
      - "6335:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - linkpulse-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.local # Using CPU-optimized version
    restart: always
    # Hot reload enabled for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8090:8000"
    depends_on:
      - db
      - redis
      - qdrant
    networks:
      - linkpulse-network

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile.local # Using CPU-optimized version
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - db
      - redis
      - backend
    networks:
      - linkpulse-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    # Hot reload enabled by using development server
    command: npm run dev
    ports:
      - "3090:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents host node_modules from overriding container's
    environment:
      # Use localhost because the browser accessing the frontend is on the host machine
      NEXT_PUBLIC_API_URL: http://localhost:8090
    depends_on:
      - backend
    networks:
      - linkpulse-network

volumes:
  postgres_data:
  qdrant_data:

networks:
  linkpulse-network:
    driver: bridge
